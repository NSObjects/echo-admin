# Kubernetes runtime overrides use GO_TEMPLATE_* environment variables so the
# image-owned /configs/config.toml remains the single static config baseline.
apiVersion: v1
kind: ConfigMap
metadata:
  name: go-template-runtime
  labels:
    app.kubernetes.io/name: go-template
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: go-template
data:
  GO_TEMPLATE_APP_NAME: "go-template"
  GO_TEMPLATE_APP_VERSION: "dev"
  GO_TEMPLATE_SYSTEM_PORT: ":9322"
  GO_TEMPLATE_SYSTEM_LEVEL: "2"
  GO_TEMPLATE_LOG_FORMAT: "json"
  GO_TEMPLATE_LOG_OUTPUT: "stdout"
  GO_TEMPLATE_LOG_CALLER: "false"
  GO_TEMPLATE_HTTP_RECOVERY_DISABLED: "false"
  GO_TEMPLATE_HTTP_REQUEST_CONTEXT_DISABLED: "false"
  GO_TEMPLATE_HTTP_REQUEST_LOG_DISABLED: "false"
  GO_TEMPLATE_HTTP_GZIP_DISABLED: "false"
  GO_TEMPLATE_HTTP_CORS_ENABLED: "false"
  GO_TEMPLATE_JWT_ENABLED: "false"
  GO_TEMPLATE_MYSQL_ENABLED: "false"
  GO_TEMPLATE_REDIS_ENABLED: "false"
  GO_TEMPLATE_MONGODB_ENABLED: "false"
  GO_TEMPLATE_TRACING_ENABLED: "false"
  GO_TEMPLATE_TRACING_PROTOCOL: "grpc"
  GO_TEMPLATE_TRACING_INSECURE: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-template-api
  labels:
    app.kubernetes.io/name: go-template
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: go-template
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: go-template
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-template
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: go-template
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: api
          image: go-template:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: go-template-runtime
          env:
            - name: GO_TEMPLATE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: go-template-secrets
                  key: jwt-secret
                  optional: true
            - name: GO_TEMPLATE_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: go-template-secrets
                  key: mysql-dsn
                  optional: true
            - name: GO_TEMPLATE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: go-template-secrets
                  key: redis-password
                  optional: true
            - name: GO_TEMPLATE_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: go-template-secrets
                  key: mongodb-uri
                  optional: true
          ports:
            - name: http
              containerPort: 9322
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: go-template-api
  labels:
    app.kubernetes.io/name: go-template
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: go-template
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: go-template
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
