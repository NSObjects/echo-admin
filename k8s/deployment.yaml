# Kubernetes runtime overrides use ECHO_ADMIN_* environment variables so the
# image-owned /configs/config.toml remains the single static config baseline.
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-admin-runtime
  labels:
    app.kubernetes.io/name: echo-admin
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: echo-admin
data:
  ECHO_ADMIN_APP_NAME: "echo-admin"
  ECHO_ADMIN_APP_VERSION: "dev"
  ECHO_ADMIN_SYSTEM_PORT: ":9322"
  ECHO_ADMIN_SYSTEM_LEVEL: "2"
  ECHO_ADMIN_LOG_FORMAT: "json"
  ECHO_ADMIN_LOG_OUTPUT: "stdout"
  ECHO_ADMIN_LOG_CALLER: "false"
  ECHO_ADMIN_HTTP_RECOVERY_DISABLED: "false"
  ECHO_ADMIN_HTTP_REQUEST_CONTEXT_DISABLED: "false"
  ECHO_ADMIN_HTTP_REQUEST_LOG_DISABLED: "false"
  ECHO_ADMIN_HTTP_GZIP_DISABLED: "false"
  ECHO_ADMIN_HTTP_CORS_ENABLED: "false"
  ECHO_ADMIN_JWT_ENABLED: "true"
  ECHO_ADMIN_ADMIN_UPLOAD_DIR: "/uploads"
  ECHO_ADMIN_MYSQL_ENABLED: "true"
  ECHO_ADMIN_REDIS_ENABLED: "false"
  ECHO_ADMIN_MONGODB_ENABLED: "false"
  ECHO_ADMIN_TRACING_ENABLED: "false"
  ECHO_ADMIN_TRACING_PROTOCOL: "grpc"
  ECHO_ADMIN_TRACING_INSECURE: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-admin-api
  labels:
    app.kubernetes.io/name: echo-admin
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: echo-admin
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-admin
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-admin
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: echo-admin
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: api
          image: echo-admin:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: echo-admin-runtime
          env:
            - name: ECHO_ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: echo-admin-secrets
                  key: jwt-secret
                  optional: false
            - name: ECHO_ADMIN_ADMIN_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: echo-admin-secrets
                  key: bootstrap-admin-password
                  optional: false
            - name: ECHO_ADMIN_MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: echo-admin-secrets
                  key: mysql-dsn
                  optional: false
            - name: ECHO_ADMIN_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: echo-admin-secrets
                  key: redis-password
                  optional: true
            - name: ECHO_ADMIN_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: echo-admin-secrets
                  key: mongodb-uri
                  optional: true
          ports:
            - name: http
              containerPort: 9322
              protocol: TCP
          volumeMounts:
            - name: uploads
              mountPath: /uploads
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            periodSeconds: 5
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: echo-admin-api
  labels:
    app.kubernetes.io/name: echo-admin
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: echo-admin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: echo-admin
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
